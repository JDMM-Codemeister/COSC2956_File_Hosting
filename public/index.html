<!DOCTYPE html>
<html>
    <head> 
        <title>Secure File Hosting Web App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="outer-container">
            <div class="user-info-div">

                <div class="form-container">
                    <form autocomplete="off" onsubmit="return false">
                        <h2 id="form-title">Login</h2>
                        <h2 id="login-message"></h2>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Enter Email..." autocomplete="off">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Enter password...">
                        </div>

                        <button id="login-register" type="submit">Login</button>
                        <p id="toggle-text">Need to register? <span id="toggle-link">Register</span></p>

                    </form>
                </div>
            </div>

            <div class="data-display-div">
                
                <div id="welcome-message">Secure File Hosting</div>
                <h2 id="file-messages"></h2>

                <input type="file" id="file-input">
                <input id="input-box" placeholder="Enter filename for all actions..." style="width: 300px; padding: 8px;">

                <div id="file-buttons">
                    <button id="file-upload-btn" style="padding: 8px;">Upload</button>
                    <button id="file-delete-btn" style="padding: 8px;">Delete</button>
                    <button id="show-all-files-btn" style="padding: 8px;">Downloads</button>
                    <button id="show-my-files-btn" style="padding: 8px;">Show my files</button>
                    <button id="hide-files-btn" style="padding: 8px;">Hide files</button>
                </div>

                <div id="file-display-div">
                    <p id="uploaded-files"></p>

                </div>

            </div>

        </div>



        <script>

            //to toggle login/register, start as Login
            let isLogin = true

            //Switch login to register if clicked
            document.getElementById("toggle-link").addEventListener("click",()=>{
                isLogin = !isLogin;

                if(isLogin){
                    document.getElementById("form-title").innerText = "Login";
                    document.getElementById("login-register").innerText = "Login";
                    document.getElementById("toggle-link").innerText = "Register";
                }else{
                    document.getElementById("form-title").innerText = "Register";
                    document.getElementById("login-register").innerText = "Register";
                    document.getElementById("toggle-link").innerText = "Login";
                }
            });

            //login and register logic
            document.getElementById("login-register").addEventListener("click", async () =>{
                
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const message = document.getElementById("login-message");

                
                const route = isLogin ? "/login" : "/register";


                const response = await fetch(route, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email: email, password: password})
                });

                //show reply message
                const data = await response.json();
                message.innerText = data.message;

                //store token upon successful login and message generation
                if(data.token){
                    localStorage.setItem("token", data.token);

                    //make "go to files page" button appear
                    document.querySelector(".user-info-div").style.display = "none";
                    document.querySelector(".data-display-div").style.display = "flex";
                    document.getElementById("welcome-message").innerText = `Welcome, ${email}`;
                    document.querySelector(".data-display-div").style.width = "100%";


                    //make file options appear
                    document.getElementById("file-input").style.display = "inline";
                    document.getElementById("input-box").style.display = "inline";
                    document.getElementById("file-buttons").style.display = "block";
                    document.getElementById("file-messages").style.display = "block";

                }
            });


            //Now do protected routes
            //upload file
            document.getElementById("file-upload-btn").addEventListener("click", async () =>{
                const file = document.getElementById("file-input").files[0];
                const customFilename = document.getElementById("input-box").value;
                const token = localStorage.getItem("token");

                //if no file
                if(!file){
                    document.getElementById("file-messages").innerText = "No file selected";
                    return;
                }

                //if no file name given
                if(customFilename == ""){
                    document.getElementById("file-messages").innerText = "File name required";
                    return;
                }

                //sanitize file name/ext/size
                const ext = "." + file.name.split(".").pop().toLowerCase();

                if (ext !== ".pdf" && ext !== ".mp4"){
                    document.getElementById("file-messages").innerText = "Only PDFs and MP4s allowed";
                    return;
                }

                //check file size
                const maxSize = 20 * 1024 * 1024 // 20 mb

                if(file.size > maxSize){
                    document.getElementById("file-messages").innerText = "File must be under 20 MB";
                    return;
                }

                //prevent code injection in name (only alphanumeric, spaces and underscores allowed)
                if(!/^[a-zA-Z0-9_ ]+$/.test(customFilename)){
                    document.getElementById("file-messages").innerText = "Name must be alphanumeric, spaces, or underscores";
                    return;
                }


                //commence upload
                const formData = new FormData();
                formData.append("file",file);
                formData.append("customFilename", customFilename);

                const response = await fetch("/upload", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${token}`},
                    body: formData
                });

                //backend response
                const data = await response.json();
                document.getElementById("file-messages").innerText = data.message;


            });


            //delete file
            document.getElementById("file-delete-btn").addEventListener("click", async () => {
                const file = document.getElementById("input-box").value;
                const token = localStorage.getItem("token");

                 //if no file name given
                if(file == ""){
                    document.getElementById("file-messages").innerText = "File name required";
                    return;
                }

                const response = await fetch("/delete", {
                    method: "DELETE",
                    headers: {"Content-Type": "application/json","Authorization": `Bearer ${token}`},
                    body: JSON.stringify({customFilename: file})
                });

                const data = await response.json();
                document.getElementById("file-messages").innerText = data.message;

            });


            //show all files
            document.getElementById("show-all-files-btn").addEventListener("click", async () =>{
                document.getElementById("file-display-div").style.display = "block";
                document.getElementById("uploaded-files").style.display = "block";
                document.getElementById("uploaded-files").style.textAlign = "center";

                //add hide files button only on show-files
                document.getElementById("hide-files-btn").style.display = "inline";

                const token = localStorage.getItem("token");



                const response = await fetch("/show-all-files",{
                    method: "GET",
                    headers: {"Authorization": `Bearer ${token}`}
                });

                const data = await response.json();
                    //string from array
                let fileList = "File | User | Size (bytes) | Upload Date\n";
                data.files.forEach(line => {
                    fileList += `${line.filename} | ${line.email} | ${line.file_size} | ${line.uploaded_at}\n`;
                });


                document.getElementById("uploaded-files").innerText = fileList;

            });


            //Show My Files
            document.getElementById("show-my-files-btn").addEventListener("click", async () =>{
                document.getElementById("file-display-div").style.display = "block";
                document.getElementById("uploaded-files").style.display = "block";
                document.getElementById("uploaded-files").style.textAlign = "center";

                //add hide files button only on show-files
                document.getElementById("hide-files-btn").style.display = "inline";
                

                const token = localStorage.getItem("token");

                const response = await fetch("/show-my-files",{
                    method: "GET",
                    headers: {"Authorization": `Bearer ${token}`}
                });

                const data = await response.json();
                 //for test
                console.log(data);

                let fileList = "File | User | Size (bytes) | Upload Date\n";
                data.files.forEach(line =>{
                    fileList += `${line.filename} | ${line.email} | ${line.file_size} | ${line.uploaded_at}\n`;
                });

                document.getElementById("uploaded-files").innerText = fileList;

            });

            //make a "hide files" buton? (not 100x necessary but easy)
            document.getElementById("hide-files-btn").addEventListener("click", async () =>{
                document.getElementById("file-display-div").style.display = "none";
                document.getElementById("uploaded-files").style.display = "none";
                document.getElementById("hide-files-btn").style.display = "none";

            })



        </script>

    </body>
</html>
